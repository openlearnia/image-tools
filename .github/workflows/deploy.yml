name: Deploy Image Tools

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build

  # Cloudflare Pages: create project "openlearnia-image-tools", connect this repo,
  # root directory = . (repo root), custom domain = image.openlearnia.com
